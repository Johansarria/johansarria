name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: github-metrics.svg
          user: johansarria
          base: header, activity, community, repositories, metadata, followers
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_languages: yes
          plugin_languages_categories: markup, programming
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 30
          plugin_languages_recent_load: 500
          plugin_profile_activity: yes
          plugin_profile_activity_base: home, repos, activity
          plugin_profile_activity_days: 14
          plugin_lines: yes
          plugin_isocalendar: yes
          plugin_calendars: yes
          plugin_calendars_base: repositories, commits
          plugin_calendars_years: 2
          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 50
          plugin_people_size: 28
          config_timezone: America/Bogota
          committer_message: Update metrics
